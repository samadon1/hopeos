# HopeOS Raspberry Pi ARM64 Build
# Builds .deb package for Raspberry Pi 4/5 using native ARM runner
#
# Trigger: Push to main, or manual dispatch
# Output: ARM64 .deb artifact downloadable from Actions tab

name: Build Raspberry Pi Package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'backend/**'
      - 'src-tauri/**'

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm  # GitHub's native ARM runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            python3-venv \
            python3-dev

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Python backend
        run: |
          cd backend/hopeos-backend
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pyinstaller
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pyinstaller hopeos-backend.spec --distpath dist --noconfirm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: HopeOS-${{ steps.version.outputs.version }}-arm64.deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: HopeOS-${{ steps.version.outputs.version }}-arm64.AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
