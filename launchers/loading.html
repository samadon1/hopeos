<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HopeOS - Starting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8faf8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #4a5d4e, #3d4f41);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(74, 93, 78, 0.3);
    }

    .logo svg {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .progress-container {
      background: #e5e7eb;
      border-radius: 12px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4a5d4e, #6b8070);
      border-radius: 12px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .status {
      font-size: 14px;
      color: #4a5d4e;
      font-weight: 500;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .step-detail {
      font-size: 12px;
      color: #9ca3af;
      min-height: 18px;
    }

    .steps {
      margin-top: 36px;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      margin-bottom: 4px;
      font-size: 13px;
      color: #6b7280;
      transition: all 0.3s ease;
    }

    .step.active {
      background: #f0f4f1;
      color: #4a5d4e;
      font-weight: 500;
    }

    .step.done {
      color: #4a5d4e;
    }

    .step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
    }

    .step.pending .step-icon {
      border: 2px solid #d1d5db;
    }

    .step.active .step-icon {
      border: 2px solid #4a5d4e;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .step.done .step-icon {
      background: #4a5d4e;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .error-box {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      text-align: left;
    }

    .error-box h3 {
      font-size: 14px;
      color: #991b1b;
      margin-bottom: 4px;
    }

    .error-box p {
      font-size: 12px;
      color: #b91c1c;
    }

    .ready-message {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
    }

    .ready-message h3 {
      font-size: 16px;
      color: #166534;
      margin-bottom: 4px;
    }

    .ready-message p {
      font-size: 13px;
      color: #15803d;
    }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 8v24M28 8v24M12 20h16" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="5" fill="#86efac" opacity="0.9"/>
        <path d="M32 29.5v5M29.5 32h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>HopeOS</h1>
    <p class="subtitle">AI-Powered EHR for Rural Healthcare</p>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p class="status" id="statusText">Initializing...</p>
    <p class="step-detail" id="stepDetail"></p>

    <div class="steps" id="stepsContainer">
      <div class="step pending" data-step="platform">
        <div class="step-icon"></div>
        <span>Detecting platform</span>
      </div>
      <div class="step pending" data-step="prerequisites">
        <div class="step-icon"></div>
        <span>Checking prerequisites</span>
      </div>
      <div class="step pending" data-step="ollama">
        <div class="step-icon"></div>
        <span>Starting AI engine</span>
      </div>
      <div class="step pending" data-step="model">
        <div class="step-icon"></div>
        <span>Loading AI model</span>
      </div>
      <div class="step pending" data-step="backend">
        <div class="step-icon"></div>
        <span>Setting up backend</span>
      </div>
      <div class="step pending" data-step="frontend">
        <div class="step-icon"></div>
        <span>Starting interface</span>
      </div>
      <div class="step pending" data-step="ready">
        <div class="step-icon"></div>
        <span>Ready</span>
      </div>
    </div>

    <div class="error-box" id="errorBox">
      <h3>Setup encountered an issue</h3>
      <p id="errorText"></p>
    </div>

    <div class="ready-message" id="readyMessage">
      <h3>HopeOS is ready!</h3>
      <p>Redirecting you now...</p>
    </div>

    <p class="footer">Gemma 4 Good Hackathon 2025</p>
  </div>

  <script>
    const FRONTEND_URL = 'http://localhost:3001';
    const STATUS_URL = '/status.json';
    const POLL_INTERVAL = 1000;

    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const stepDetail = document.getElementById('stepDetail');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const readyMessage = document.getElementById('readyMessage');

    const stepProgress = {
      platform: 5,
      prerequisites: 15,
      ollama: 30,
      model: 50,
      backend: 70,
      frontend: 85,
      ready: 100,
    };

    const stepLabels = {
      platform: 'Detecting platform...',
      prerequisites: 'Checking prerequisites...',
      ollama: 'Starting AI engine...',
      model: 'Loading AI model...',
      backend: 'Setting up backend...',
      frontend: 'Starting interface...',
      ready: 'HopeOS is ready!',
    };

    let lastStep = '';

    function updateStep(step, detail) {
      if (step === lastStep) return;
      lastStep = step;

      // Update progress bar
      const pct = stepProgress[step] || 0;
      progressBar.style.width = pct + '%';

      // Update status text
      statusText.textContent = stepLabels[step] || step;
      stepDetail.textContent = detail || '';

      // Update step list
      const steps = document.querySelectorAll('.step');
      let foundCurrent = false;
      steps.forEach(el => {
        const s = el.dataset.step;
        if (s === step) {
          el.className = 'step active';
          el.querySelector('.step-icon').innerHTML = '';
          foundCurrent = true;
        } else if (!foundCurrent) {
          el.className = 'step done';
          el.querySelector('.step-icon').innerHTML = '&#10003;';
        } else {
          el.className = 'step pending';
          el.querySelector('.step-icon').innerHTML = '';
        }
      });
    }

    function showError(msg) {
      errorBox.style.display = 'block';
      errorText.textContent = msg;
    }

    function showReady() {
      readyMessage.style.display = 'block';
      progressBar.style.width = '100%';

      // Mark all steps done
      document.querySelectorAll('.step').forEach(el => {
        el.className = 'step done';
        el.querySelector('.step-icon').innerHTML = '&#10003;';
      });

      // Redirect after a short delay
      setTimeout(() => {
        window.location.href = FRONTEND_URL + '/admin/login';
      }, 1500);
    }

    async function pollStatus() {
      try {
        const resp = await fetch(STATUS_URL + '?t=' + Date.now());
        if (!resp.ok) throw new Error('Status not available');
        const data = await resp.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        updateStep(data.step, data.detail || '');

        if (data.step === 'ready') {
          showReady();
          return;
        }
      } catch (e) {
        // Status file not ready yet, keep polling
      }

      setTimeout(pollStatus, POLL_INTERVAL);
    }

    // Also try to detect if frontend is already running
    async function checkFrontendDirect() {
      try {
        const resp = await fetch(FRONTEND_URL, { mode: 'no-cors' });
        // If we get here without error, frontend might be up
        // But we still rely on status.json for proper flow
      } catch (e) {
        // Frontend not ready
      }
    }

    // Start polling
    updateStep('platform', 'Starting setup...');
    pollStatus();
  </script>
</body>
</html>
