# Synthea Configuration for Ghana
# NCD Prediction Training Data Generation

# ===== DEMOGRAPHICS =====
generate.demographics.socioeconomic.weights.income = 0.3
generate.demographics.socioeconomic.weights.education = 0.7

# ===== GEOGRAPHY =====
generate.geography.country_code = GH
generate.geography.timezones.default_file = timezones.csv
generate.geography.zipcodes.default_file = ../synthea-ghana/zipcodes.csv
generate.geography.demographics.default_file = ../synthea-ghana/demographics.csv

# ===== PROVIDERS =====
generate.providers.default_file = ../synthea-ghana/providers.csv

# ===== NAMES =====
generate.demographics.given_names.male = ../synthea-ghana/names/male_first.txt
generate.demographics.given_names.female = ../synthea-ghana/names/female_first.txt

# ===== DISEASE PREVALENCE (Ghana-adjusted) =====
# Hypertension: ~30-35% of adults in Ghana
lifecycle.prevalence.hypertension = 0.32

# Diabetes: ~6-8% in Ghana
lifecycle.prevalence.diabetes = 0.07

# Obesity lower in Ghana than US
metabolic.obesity.prevalence = 0.15

# ===== EXPORTERS =====
exporter.fhir.export = true
exporter.fhir.use_us_core_ig = false
exporter.ccda.export = false
exporter.csv.export = true
exporter.text.export = false
exporter.hospital.fhir.export = true
exporter.practitioner.fhir.export = true

# Export directory
exporter.baseDirectory = ./output/ghana

# ===== GENERATION SETTINGS =====
generate.append_numbers_to_person_names = false
generate.only_dead_patients = false
generate.only_alive_patients = true

# Age distribution - focus on adults for NCD screening
generate.demographics.default_file = ../synthea-ghana/demographics.csv

# ===== MODULES =====
# Enable metabolic syndrome module (includes diabetes and hypertension)
generate.modules.metabolic_syndrome = true
generate.modules.hypertension = true
generate.modules.diabetes = true

# ===== COSTS (Ghana Cedis - simplified) =====
# These are placeholder values
generate.costs.default_procedure_cost = 50.0
generate.costs.default_medication_cost = 10.0
generate.costs.default_encounter_cost = 25.0

# ===== RECORD SETTINGS =====
# Generate enough history for NCD risk assessment
generate.max_attempts_to_keep_patient = 10
